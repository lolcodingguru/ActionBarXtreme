# ============================================
# ||            Configuration File            ||
# ============================================

# ============[ Global Settings ]===========
# -------------------------------------------------------
# ||  Prefix that will appear before every    ||
# ||  announcement (event-triggered and       ||
# ||       using announce commands).          ||
# ||       For no prefix, leave as ""         ||
# -------------------------------------------------------
prefix: "&4&l[Broadcast]&c "

# ============[ Permanent Action Bar ]===========
PermanentActionBar:
  # -------------------------------------------------------
  # ||               Enable/Disable                ||
  # -------------------------------------------------------
  Enable: false
  
  # -------------------------------------------------------
  # ||                 Message                     ||
  # ||   Color codes are supported (&4, &c, etc.)  ||
  # ||   Using color codes will override and       ||
  # ||    disable the alternating colors feature.  ||
  # -------------------------------------------------------
  actionBarMessage: PLAY.SERVERNAME.NET
  
  # -------------------------------------------------------
  # ||    Duration (in ticks) 20 ticks = 1 second  ||
  # ||       In other words, every how often the   ||
  # ||     actionbar alternates between colors.    ||
  # -------------------------------------------------------
  duration: 6
  
  # -------------------------------------------------------
  # ||             Message Styles                  ||
  # ||        More than one can be enabled.        ||
  # -------------------------------------------------------
  MessageStyles:
    isBold: true
    isItalic: false
    isUnderline: false
    isStrikethrough: false
    isMagic: false
  
  # -------------------------------------------------------
  # ||               Alternating Colors            ||
  # ||          Disabled for versions 1.9-1.11     ||
  # ||      Simply leave WHITE or just one color   ||
  # ||       if you dont want alternating colors.  ||
  # ||       You can add as many as you want       ||
  # -------------------------------------------------------
  # Find the full color list here: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/ChatColor.html
  ChatColor:
    - YELLOW
    - AQUA
    - LIGHT_PURPLE
    - RED
    - BLUE
    - WHITE
    - MAGIC

# ===================[ Events ]====================
# Please note that duration here is in seconds, not ticks!
# As usual, color codes are supported (&4, &c, etc.)
# -------------------------------------------------------
Events:
  # -------------------------------------------------------
  # ||          On Player Ban Event                 ||
  # -------------------------------------------------------
  OnPlayerBan:
    Enable: false
    Message: "A player was just banned from the server. Don't Cheat!"
    Duration: 5
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Player Kick Event                     ||
  # -------------------------------------------------------
  OnPlayerKick:
    Enable: false
    Message: "A player has been kicked from the server."
    Duration: 10
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Dragon Death Event                ||
  # -------------------------------------------------------
  OnDragonDeath:
    Enable: false
    Message: "The Ender Dragon has been defeated!"
    Duration: 10
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Dragon Respawn Event                  ||
  # -------------------------------------------------------
  OnDragonRespawn:
    Enable: false
    Message: "The Ender Dragon has respawned!"
    Duration: 10
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Elder Guardian Death Event            ||
  # -------------------------------------------------------
  OnElderGuardianDeath:
    Enable: false
    Message: "An Elder Guardian has been defeated!"
    Duration: 10
    allowForceEvent: true
  # -------------------------------------------------------
  # ||          On Player Killed Player Event            ||
  # ||          This is the only event where             ||
  # ||           placeholders are supported!             ||
  # ||          %killer% - Player that killed.           ||
  # ||         %killed% - Player that was killed.        ||
  # -------------------------------------------------------
  OnPlayerKilledPlayer:
    Enable: false
    Message: "%killed% was killed by %killer%"
    Duration: 10
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Warden Death Event                    ||
  # -------------------------------------------------------
  OnWardenDeath:
    Enable: false
    Message: "A Warden has been defeated!"
    Duration: 10
    allowForceEvent: true

  # -------------------------------------------------------
  # ||          On Wither Death Event                    ||
  # -------------------------------------------------------
  OnWitherDeath:
    Enable: false
    Message: "The Wither has been defeated!"
    Duration: 10
    allowForceEvent: true

# ===============[ Actionbar Announcements (/abx announce) ]=================
Announcements:
  # -------------------------------------------------------
  # ||               Enable/Disable                ||
  # -------------------------------------------------------
  EnableAnnouncements: true

  # -------------------------------------------------------
  # ||               Default Duration              ||
  # ||   The Duration for an announcement can be   ||
  # ||     set in the command, but this is the     ||
  # ||        default duration if the duration     ||
  # ||           argument was left blank           ||
  # -------------------------------------------------------
  defaultDuration: 5

